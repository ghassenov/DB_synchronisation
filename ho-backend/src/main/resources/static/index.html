<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HO Consolidated Console</title>
  <style>
    :root {
      --bg: #eef8f3;
      --ink: #1a2d27;
      --panel: #fafffd;
      --line: #c8dfd4;
      --accent: #1a8f5e;
      --accent-2: #a84c33;
      --muted: #5c6f67;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(circle at 15% 10%, #ddf6e8, #eef8f3 55%);
      font-family: "Gill Sans", "Segoe UI", sans-serif;
      padding: 1.5rem;
    }

    .shell {
      max-width: 1250px;
      margin: 0 auto;
      display: grid;
      gap: 1rem;
      grid-template-columns: 390px 1fr;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(20, 67, 49, 0.08);
      overflow: hidden;
    }

    .head {
      padding: 1rem 1.1rem;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(120deg, #dff7ea, #d2efe8);
    }

    .head h1, .head h2 {
      margin: 0;
      font-size: 1.08rem;
      letter-spacing: 0.2px;
    }

    .sub {
      margin-top: 0.35rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .body {
      padding: 0.95rem 1.05rem 1.1rem;
    }

    .fields {
      display: grid;
      gap: 0.6rem;
      grid-template-columns: 1fr 1fr;
    }

    label {
      display: grid;
      gap: 0.3rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    input {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.52rem 0.58rem;
      font-size: 0.92rem;
      background: #fff;
    }

    .actions {
      margin-top: 0.9rem;
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 0.52rem 0.85rem;
      font-size: 0.9rem;
      color: #fff;
      cursor: pointer;
      background: var(--accent);
    }

    button.secondary {
      background: #74897f;
    }

    button.warn {
      background: var(--accent-2);
    }

    .status {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 1.2rem;
    }

    .table-wrap {
      max-height: 68vh;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      padding: 0.55rem 0.48rem;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #e7f5ed;
      z-index: 1;
    }

    tbody tr:hover {
      background: #dff6e7;
    }

    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .table-wrap { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card">
      <div class="head">
        <h1>Head Office Consolidated Console</h1>
        <div class="sub">RabbitMQ consumer writes here. You can also manage rows manually from this UI.</div>
      </div>
      <div class="body">
        <form id="saleForm">
          <div class="fields">
            <label>BO ID<input id="boId" type="text" required placeholder="BO1 or BO2" /></label>
            <label>Local Sale ID<input id="localSaleId" type="number" min="1" required /></label>
            <label>Date<input id="date" type="date" required /></label>
            <label>Region<input id="region" type="text" required /></label>
            <label>Product<input id="product" type="text" required /></label>
            <label>Qty<input id="qty" type="number" min="0" required /></label>
            <label>Cost<input id="cost" type="number" step="0.01" min="0" required /></label>
            <label>Amt<input id="amt" type="number" step="0.01" min="0" required /></label>
            <label>Tax<input id="tax" type="number" step="0.01" min="0" required /></label>
            <label>Total<input id="total" type="number" step="0.01" min="0" required /></label>
          </div>
          <div class="actions">
            <button type="submit" id="saveBtn">Create</button>
            <button type="button" class="secondary" id="clearBtn">Clear</button>
            <button type="button" class="secondary" id="refreshBtn">Refresh</button>
            <button type="button" class="warn" id="deleteBtn" disabled>Delete Selected</button>
          </div>
        </form>
        <div class="status" id="status"></div>
      </div>
    </section>

    <section class="card">
      <div class="head">
        <h2>Consolidated Sales Table</h2>
        <div class="sub">Click a row to edit</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>BO</th>
              <th>Local</th>
              <th>Date</th>
              <th>Region</th>
              <th>Product</th>
              <th>Qty</th>
              <th>Cost</th>
              <th>Amt</th>
              <th>Tax</th>
              <th>Total</th>
              <th>Received At</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const form = document.getElementById("saleForm");
    const rowsEl = document.getElementById("rows");
    const statusEl = document.getElementById("status");
    const deleteBtn = document.getElementById("deleteBtn");
    const saveBtn = document.getElementById("saveBtn");

    let selectedId = null;

    function toNumber(id) {
      return Number.parseFloat(document.getElementById(id).value);
    }

    function payload() {
      return {
        boId: document.getElementById("boId").value,
        localSaleId: Number.parseInt(document.getElementById("localSaleId").value, 10),
        date: document.getElementById("date").value,
        region: document.getElementById("region").value,
        product: document.getElementById("product").value,
        qty: Number.parseInt(document.getElementById("qty").value, 10),
        cost: toNumber("cost"),
        amt: toNumber("amt"),
        tax: toNumber("tax"),
        total: toNumber("total")
      };
    }

    function resetForm() {
      selectedId = null;
      form.reset();
      saveBtn.textContent = "Create";
      deleteBtn.disabled = true;
      [...rowsEl.children].forEach((tr) => tr.style.background = "");
    }

    async function loadRows() {
      const response = await fetch("/api/sales");
      if (!response.ok) {
        throw new Error(`Fetch failed (${response.status})`);
      }
      const rows = await response.json();
      rowsEl.innerHTML = "";

      for (const row of rows) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.id ?? ""}</td>
          <td>${row.boId ?? ""}</td>
          <td>${row.localSaleId ?? ""}</td>
          <td>${row.date ?? ""}</td>
          <td>${row.region ?? ""}</td>
          <td>${row.product ?? ""}</td>
          <td>${row.qty ?? ""}</td>
          <td>${row.cost ?? ""}</td>
          <td>${row.amt ?? ""}</td>
          <td>${row.tax ?? ""}</td>
          <td>${row.total ?? ""}</td>
          <td>${row.receivedAt ?? ""}</td>
        `;

        tr.addEventListener("click", () => {
          selectedId = row.id;
          document.getElementById("boId").value = row.boId ?? "";
          document.getElementById("localSaleId").value = row.localSaleId ?? "";
          document.getElementById("date").value = row.date ?? "";
          document.getElementById("region").value = row.region ?? "";
          document.getElementById("product").value = row.product ?? "";
          document.getElementById("qty").value = row.qty ?? "";
          document.getElementById("cost").value = row.cost ?? "";
          document.getElementById("amt").value = row.amt ?? "";
          document.getElementById("tax").value = row.tax ?? "";
          document.getElementById("total").value = row.total ?? "";

          saveBtn.textContent = "Update";
          deleteBtn.disabled = false;
          statusEl.textContent = `Editing HO row ${row.id}`;

          [...rowsEl.children].forEach((x) => x.style.background = "");
          tr.style.background = "#bfeace";
        });

        rowsEl.appendChild(tr);
      }

      if (!rows.length) {
        statusEl.textContent = "No consolidated rows yet.";
      }
    }

    async function save(event) {
      event.preventDefault();
      const method = selectedId ? "PUT" : "POST";
      const endpoint = selectedId ? `/api/sales/${selectedId}` : "/api/sales";
      const response = await fetch(endpoint, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload())
      });
      if (!response.ok) {
        throw new Error(`Save failed (${response.status})`);
      }
      statusEl.textContent = selectedId ? "Consolidated row updated." : "Consolidated row created.";
      resetForm();
      await loadRows();
    }

    async function removeSelected() {
      if (!selectedId) {
        return;
      }
      const response = await fetch(`/api/sales/${selectedId}`, { method: "DELETE" });
      if (!response.ok) {
        throw new Error(`Delete failed (${response.status})`);
      }
      statusEl.textContent = `Consolidated row ${selectedId} deleted.`;
      resetForm();
      await loadRows();
    }

    form.addEventListener("submit", async (event) => {
      try {
        await save(event);
      } catch (error) {
        statusEl.textContent = error.message;
      }
    });

    document.getElementById("deleteBtn").addEventListener("click", async () => {
      try {
        await removeSelected();
      } catch (error) {
        statusEl.textContent = error.message;
      }
    });

    document.getElementById("clearBtn").addEventListener("click", resetForm);
    document.getElementById("refreshBtn").addEventListener("click", async () => {
      try {
        await loadRows();
        statusEl.textContent = "Rows refreshed.";
      } catch (error) {
        statusEl.textContent = error.message;
      }
    });

    loadRows().catch((error) => {
      statusEl.textContent = error.message;
    });
    setInterval(() => loadRows().catch(() => {}), 10000);
  </script>
</body>
</html>
